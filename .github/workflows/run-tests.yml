name: run-tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { php: '8.1', laravel: '9.*',  testbench: '7.*' }
          - { php: '8.1', laravel: '10.*', testbench: '8.*' }
          - { php: '8.2', laravel: '10.*', testbench: '8.*' }
          - { php: '8.2', laravel: '11.*', testbench: '9.*' }
          - { php: '8.3', laravel: '11.*', testbench: '9.*' }
          - { php: '8.3', laravel: '12.*', testbench: '10.*' }
          - { php: '8.4', laravel: '12.*', testbench: '10.*' }
          - { php: '8.4', laravel: '13.*', testbench: '11.*' }

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: json
          coverage: none

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update
          composer update --prefer-dist --no-interaction

      - name: Execute tests
        run: vendor/bin/pest

  code-style:
    runs-on: ubuntu-latest
    name: Code style (Pint)
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction

      - name: Check code style
        run: vendor/bin/pint --test
